        <ul class="nav-links">

    <!-- ================= HERO SECTION ================= -->

    <section class="hero">
      <div class="hero-content">
        <h1>Academic Planner</h1>

        <p>
          Organise your academic activities and keep track of important tasks.
        </p>

        <a href="#planner" class="btn"> Open Planner </a>
      </div>
    </section>

    <!-- ================= MAIN CONTENT ================= -->

    <main>
      <section id="planner" class="planner-section">
        <h2>Academic Planner</h2>

        <div class="planner-form">
          <div class="input-group">
            <label for="taskName">Task Name</label>
            <input type="text" id="taskName" placeholder="Enter a task" />
          </div>

          <div class="date-time-container">
            <div class="input-group">
              <label for="taskDate">Date</label>
              <input type="date" id="taskDate" />
            </div>

            <div class="input-group">
              <label for="taskTime">Time</label>
              <input type="time" id="taskTime" />
            </div>
          </div>

          <button id="addTaskBtn" class="planner-btn add-btn">Add Task</button>
        </div>

        <section class="task-list">
          <h2>List of Tasks</h2>

          <div id="taskContainer">
            <!-- Tasks appear here automatically -->
          </div>
        </section>

        <div class="planner-buttons">
          <button id="deleteTaskBtn" class="planner-btn delete-btn">
            Delete Task
          </button>

          <button id="completeTaskBtn" class="planner-btn complete-btn">
            Mark as Completed
          </button>
        </div>
      </section>
    </main>
